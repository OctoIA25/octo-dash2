version: '3.8'

services:
  # =======================================
  # OCTODASH API Server (Node.js Express)
  # =======================================
  octodash-api:
    container_name: octodash-api
    build:
      context: ./server
      dockerfile: ../Dockerfile.api
    image: octodash-api:latest
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - octodash-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =======================================
  # OCTODASH CRM - Aplicação Principal
  # =======================================
  octodash-crm:
    container_name: octodash-crm
    build:
      context: .
      dockerfile: Dockerfile.node
    image: octodash-crm:latest
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - KENLO_XML_URL=https://imob.valuegaia.com.br/integra/midia.ashx?midia=ChaveNaMao&p=pQdBmFcGRFgUiPu6qbT5CB0b4QQUZf5v
    depends_on:
      - octodash-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - octodash-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =======================================
  # NGINX Reverse Proxy (Opcional)
  # Para adicionar SSL/HTTPS em produção
  # =======================================
  # nginx-proxy:
  #   container_name: octodash-nginx
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - octodash-crm
  #   networks:
  #     - octodash-network
  #   restart: unless-stopped

networks:
  octodash-network:
    driver: bridge

